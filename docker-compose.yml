services:

  # ==========================================
  # MONGODB
  # ==========================================

  mongodb:
    image: mongo:6

    container_name: intervix_mongodb

    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    command: ["--wiredTigerCacheSizeGB", "0.25"]

    networks:
      - intervix-network

  # ==========================================
  # BACKEND
  # ==========================================

  backend:
    image: shreyanshp0/intervix-backend:latest

    container_name: intervix_backend

    pull_policy: always

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./Backend/.env

    environment:
      - NODE_ENV=production
      - DOCKER_CONTAINER=true

      - MONGODB_URI=mongodb://mongodb:27017/intervix

      - FRONTEND_URL=https://intervix.duckdns.org
      - PUBLIC_APP_URL=https://intervix.duckdns.org

      - TRUSTED_ORIGINS=https://intervix.duckdns.org,http://localhost:3000

      - TURN_URL=turns:intervix.duckdns.org:5349,turn:intervix.duckdns.org:3478

    depends_on:
      - mongodb

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 60s

    networks:
      - intervix-network

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    image: shreyanshp0/intervix-frontend:latest

    container_name: intervix_frontend

    pull_policy: always

    restart: unless-stopped

    ports:
      - "3000:80"

    env_file:
      - ./Frontend/.env

    environment:
      - NODE_ENV=production
      - DOCKER_CONTAINER=true

      - VITE_API_URL=/api

      - VITE_TURN_URL=turns:intervix.duckdns.org:5349,turn:intervix.duckdns.org:3478

    depends_on:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 60s

    networks:
      - intervix-network

  # ==========================================
  # COTURN
  # ==========================================

  coturn:
    image: coturn/coturn:4

    container_name: intervix_coturn

    restart: unless-stopped

    command:
      - -c
      - /etc/coturn/turnserver.conf

    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"

      - "5349:5349/tcp"

      - "49160-49200:49160-49200/udp"

    environment:
      - TURN_STATIC_AUTH_SECRET=change-me

    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - backend

    networks:
      - intervix-network

# ==========================================
# NETWORKS
# ==========================================

networks:
  intervix-network:
    driver: bridge

# ==========================================
# VOLUMES
# ==========================================

volumes:
  mongodb_data: