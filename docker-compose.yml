
services:

  # ==========================================
  # BACKEND
  # ==========================================

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile

    image: ${BACKEND_IMAGE:-intervix-backend:local}

    container_name: intervix_backend

    restart: unless-stopped

    ports:
      - "${BACKEND_PORT:-5000}:5000"

    env_file:
      - ./Backend/.env

    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DOCKER_CONTAINER=true
      - PORT=5000
      - APP_DOMAIN=${APP_DOMAIN:-intervix.duckdns.org}
      - FRONTEND_URL=${FRONTEND_URL:-https://intervix.duckdns.org}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-https://intervix.duckdns.org}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-https://intervix.duckdns.org}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    mem_limit: 500m

    cpus: 0.75

    networks:
      - intervix-network

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}

    image: ${FRONTEND_IMAGE:-intervix-frontend:local}

    container_name: intervix_frontend

    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-3000}:80"

    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DOCKER_CONTAINER=true
      - VITE_API_URL=${VITE_API_URL:-/api}

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

    mem_limit: 250m

    cpus: 0.50

    networks:
      - intervix-network

# ==========================================
# NETWORKS
# ==========================================

networks:
  intervix-network:
    driver: bridge

