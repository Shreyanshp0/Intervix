services:

  # ==========================================
  # MONGODB
  # ==========================================

  mongodb:
    image: mongo:6

    container_name: intervix_mongodb

    restart: unless-stopped

    command:
      - --wiredTigerCacheSizeGB
      - "0.1"

    volumes:
      - mongodb_data:/data/db

    mem_limit: 300m

    cpus: 0.40

    networks:
      - intervix-network

  # ==========================================
  # BACKEND
  # ==========================================

  backend:
    image: shreyanshp0/intervix-backend:latest

    container_name: intervix_backend

    pull_policy: always

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./Backend/.env

    environment:
      - NODE_ENV=production

      - DOCKER_CONTAINER=true

      - MONGODB_URI=mongodb://mongodb:27017/intervix

      - FRONTEND_URL=https://intervix.duckdns.org

      - PUBLIC_APP_URL=https://intervix.duckdns.org

      - TRUSTED_ORIGINS=https://intervix.duckdns.org,http://localhost:3000

    depends_on:
      - mongodb

    mem_limit: 400m

    cpus: 0.50

    networks:
      - intervix-network

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    image: shreyanshp0/intervix-frontend:latest

    container_name: intervix_frontend

    pull_policy: always

    restart: unless-stopped

    ports:
      - "3000:80"

    env_file:
      - ./Frontend/.env

    environment:
      - NODE_ENV=production

      - DOCKER_CONTAINER=true

      - VITE_API_URL=/api

    depends_on:
      - backend

    mem_limit: 200m

    cpus: 0.30

    networks:
      - intervix-network

# ==========================================
# NETWORKS
# ==========================================

networks:
  intervix-network:
    driver: bridge

# ==========================================
# VOLUMES
# ==========================================

volumes:
  mongodb_data: