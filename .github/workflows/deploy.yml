name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t shreyanshp0/intervix-backend:latest \
            -t shreyanshp0/intervix-backend:${{ env.TIMESTAMP }} \
            ./Backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t shreyanshp0/intervix-frontend:latest \
            -t shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }} \
            ./Frontend

      - name: Push Backend Images
        run: |
          docker push shreyanshp0/intervix-backend:latest
          docker push shreyanshp0/intervix-backend:${{ env.TIMESTAMP }}

      - name: Push Frontend Images
        run: |
          docker push shreyanshp0/intervix-frontend:latest
          docker push shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 180s
          command_timeout: 40m
          script_stop: true
          envs: MONGODB_URI,JWT_SECRET,GROQ_API_KEY,GEMINI_API_KEY,HF_TOKEN,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e

            cd ~/Intervix

            echo "========================================="
            echo "Ultra-Light Deployment Starting"
            echo "========================================="

            echo "Updating repository..."
            git fetch origin
            git reset --hard origin/main

            echo "Creating environment files..."
            mkdir -p Backend Frontend

            cat > .env <<EOF
            NODE_ENV=production
            APP_DOMAIN=intervix.duckdns.org

            BACKEND_PORT=5000
            FRONTEND_PORT=3000

            FRONTEND_URL=https://intervix.duckdns.org
            PUBLIC_APP_URL=https://intervix.duckdns.org
            TRUSTED_ORIGINS=https://intervix.duckdns.org,http://intervix.duckdns.org,http://localhost:3000,http://127.0.0.1:3000
            VITE_API_URL=/api

            BACKEND_IMAGE=shreyanshp0/intervix-backend:latest
            FRONTEND_IMAGE=shreyanshp0/intervix-frontend:latest
            EOF

            cat > Backend/.env <<EOF
            MONGODB_URI=${MONGODB_URI}
            JWT_SECRET=${JWT_SECRET}
            GROQ_API_KEY=${GROQ_API_KEY}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            HF_TOKEN=${HF_TOKEN}

            FRONTEND_URL=https://intervix.duckdns.org
            PUBLIC_APP_URL=https://intervix.duckdns.org
            TRUSTED_ORIGINS=https://intervix.duckdns.org,http://intervix.duckdns.org,http://localhost:3000,http://127.0.0.1:3000

            NODE_ENV=production
            EOF

            cat > Frontend/.env <<EOF
            VITE_API_URL=/api
            NODE_ENV=production
            EOF

            echo "Environment files created"

            echo "Stopping old containers..."
            docker compose down --remove-orphans || true

            if [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
              echo "Logging in to Docker Hub on EC2..."
              echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            fi

            echo "Pulling latest backend/frontend images..."
            docker compose pull backend frontend

            echo "Starting services..."
            docker compose up -d --force-recreate backend frontend

            echo "Waiting for services..."
            sleep 25

            echo "Checking Backend..."
            curl --fail --max-time 10 http://127.0.0.1:5000/health

            echo "Checking Frontend..."
            curl --fail --max-time 10 http://127.0.0.1:3000 > /dev/null

            echo "Active Ports"
            sudo lsof -i :3000 || true
            sudo lsof -i :5000 || true
            sudo lsof -i :80 || true
            sudo lsof -i :443 || true

            echo "Validating NGINX..."
            sudo nginx -t

            echo "Restarting NGINX..."
            sudo systemctl restart nginx

            echo "Running Containers"
            docker ps

            echo ""
            echo "========================================="
            echo "Deployment Finished Successfully"
            echo "========================================="
            echo ""
            echo "Frontend:"
            echo "https://intervix.duckdns.org"
            echo ""
            echo "Backend:"
            echo "https://intervix.duckdns.org/api"
