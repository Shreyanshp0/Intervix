name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Backend .env
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> Backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> Backend/.env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> Backend/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> Backend/.env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> Backend/.env

      - name: Create Frontend .env
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> Frontend/.env

      - name: Build Backend Image
        run: |
          docker build -t shreyanshp0/intervix-backend:latest ./Backend

      - name: Build Frontend Image
        run: |
          docker build -t shreyanshp0/intervix-frontend:latest ./Frontend

      - name: Push Backend Image
        run: |
          docker push shreyanshp0/intervix-backend:latest

      - name: Push Frontend Image
        run: |
          docker push shreyanshp0/intervix-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Intervix
            docker compose down
            docker system prune -a -f
            docker builder prune -a -f
            docker volume prune -f
            docker compose pull
            docker compose up -d --force-recreate --no-build
            echo "Waiting for backend services to bootstrap..."
            sleep 8
            docker compose ps
            echo "Running deployment API health check assertion..."
            curl -f http://localhost:5000/health || (docker compose logs backend && exit 1)
            echo "Running deployment route health check assertion..."
            curl -f http://localhost:5000/health/routes || (docker compose logs backend && exit 1)
            echo "Deployment verified successfully!"
    
