name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # TIMESTAMP
      # ==========================================

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      # ==========================================
      # DOCKER LOGIN
      # ==========================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # BUILD BACKEND
      # ==========================================

      - name: Build Backend Image
        run: |
          docker build \
            -t shreyanshp0/intervix-backend:latest \
            -t shreyanshp0/intervix-backend:${{ env.TIMESTAMP }} \
            ./Backend

      # ==========================================
      # BUILD FRONTEND
      # ==========================================

      - name: Build Frontend Image
        run: |
          docker build \
            -t shreyanshp0/intervix-frontend:latest \
            -t shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }} \
            ./Frontend

      # ==========================================
      # PUSH IMAGES
      # ==========================================

      - name: Push Backend Images
        run: |
          docker push shreyanshp0/intervix-backend:latest
          docker push shreyanshp0/intervix-backend:${{ env.TIMESTAMP }}

      - name: Push Frontend Images
        run: |
          docker push shreyanshp0/intervix-frontend:latest
          docker push shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }}

      # ==========================================
      # DEPLOY
      # ==========================================

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          envs: MONGODB_URI,JWT_SECRET,GROQ_API_KEY,GEMINI_API_KEY,HF_TOKEN

          script: |

            set -e

            echo "=========================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=========================================="

            cd ~/Intervix

            # ======================================
            # UPDATE CODE
            # ======================================

            git reset --hard
            git pull origin main

            # ======================================
            # CREATE ENV FILES
            # ======================================

            mkdir -p Backend
            mkdir -p Frontend

            cat > Backend/.env <<EOF
            MONGODB_URI=${MONGODB_URI}
            JWT_SECRET=${JWT_SECRET}
            GROQ_API_KEY=${GROQ_API_KEY}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            HF_TOKEN=${HF_TOKEN}

            CLIENT_URL=https://intervix.duckdns.org

            NODE_ENV=production
            EOF

            cat > Frontend/.env <<EOF
            VITE_API_URL=https://intervix.duckdns.org/api

            NODE_ENV=production
            EOF

            echo "✅ Environment files created"

            # ======================================
            # STOP OLD CONTAINERS
            # ======================================

            docker compose down || true

            # ======================================
            # PULL ONLY REQUIRED IMAGES
            # ======================================

            docker compose pull backend frontend

            # ======================================
            # START DATABASE FIRST
            # ======================================

            docker compose up -d mongodb

            echo "Waiting for MongoDB..."

            sleep 15

            # ======================================
            # START BACKEND
            # ======================================

            docker compose up -d backend

            echo "Waiting for Backend..."

            sleep 20

            # ======================================
            # START FRONTEND
            # ======================================

            docker compose up -d frontend

            echo "Waiting for Frontend..."

            sleep 15

            # ======================================
            # START COTURN
            # ======================================

            docker compose up -d coturn

            # ======================================
            # HEALTH CHECKS
            # ======================================

            echo "Checking backend..."

            curl -f http://localhost:5000/health || exit 1

            echo "Checking frontend..."

            curl -f http://localhost:3000 || exit 1

            # ======================================
            # NGINX
            # ======================================

            sudo nginx -t

            sudo systemctl restart nginx

            echo "=========================================="
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo "=========================================="

            docker ps