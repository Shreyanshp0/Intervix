name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT REPOSITORY
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # SET TIMESTAMP
      # ==========================================

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      # ==========================================
      # LOGIN TO DOCKER HUB
      # ==========================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # BUILD BACKEND IMAGE
      # ==========================================

      - name: Build Backend Image
        run: |
          docker build \
            -t shreyanshp0/intervix-backend:latest \
            -t shreyanshp0/intervix-backend:${{ env.TIMESTAMP }} \
            ./Backend

      # ==========================================
      # BUILD FRONTEND IMAGE
      # ==========================================

      - name: Build Frontend Image
        run: |
          docker build \
            -t shreyanshp0/intervix-frontend:latest \
            -t shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }} \
            ./Frontend

      # ==========================================
      # PUSH BACKEND IMAGE
      # ==========================================

      - name: Push Backend Images
        run: |
          docker push shreyanshp0/intervix-backend:latest
          docker push shreyanshp0/intervix-backend:${{ env.TIMESTAMP }}

      # ==========================================
      # PUSH FRONTEND IMAGE
      # ==========================================

      - name: Push Frontend Images
        run: |
          docker push shreyanshp0/intervix-frontend:latest
          docker push shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }}

      # ==========================================
      # DEPLOY TO EC2
      # ==========================================

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        with:
          host: ${{ secrets.EC2_HOST }}

          username: ${{ secrets.EC2_USERNAME }}

          key: ${{ secrets.EC2_SSH_KEY }}

          timeout: 180s

          command_timeout: 40m

          script_stop: true

          envs: MONGODB_URI,JWT_SECRET,GROQ_API_KEY,GEMINI_API_KEY,HF_TOKEN

          script: |

            set -e

            cd ~/Intervix

            echo "========================================="
            echo "🚀 Ultra-Light Deployment Starting"
            echo "========================================="

            # =====================================
            # UPDATE CODE SAFELY
            # =====================================

            echo "📦 Updating repository..."

            git fetch origin

            git reset --hard origin/main

            # =====================================
            # CREATE ENV FILES
            # =====================================

            echo "🔐 Creating environment files..."

            mkdir -p Backend

            mkdir -p Frontend

            # -------------------------------------
            # BACKEND ENV
            # -------------------------------------

            cat > Backend/.env <<EOF
            MONGODB_URI=${MONGODB_URI}

            JWT_SECRET=${JWT_SECRET}

            GROQ_API_KEY=${GROQ_API_KEY}

            GEMINI_API_KEY=${GEMINI_API_KEY}

            HF_TOKEN=${HF_TOKEN}

            CLIENT_URL=https://intervix.duckdns.org

            NODE_ENV=production
            EOF

            # -------------------------------------
            # FRONTEND ENV
            # -------------------------------------

            cat > Frontend/.env <<EOF
            VITE_API_URL=https://intervix.duckdns.org/api

            NODE_ENV=production
            EOF

            echo "✅ Environment files created"

            # =====================================
            # STOP OLD CONTAINERS
            # =====================================

            echo "🛑 Stopping old containers..."

            docker compose down --remove-orphans || true

            # =====================================
            # PULL ONLY REQUIRED IMAGES
            # =====================================

            echo "📥 Pulling latest backend/frontend images..."

            docker compose pull backend frontend

            # =====================================
            # START BACKEND
            # =====================================

            echo "🟢 Starting Backend..."

            docker compose up -d backend

            echo "⏳ Waiting for Backend..."

            sleep 20

            # =====================================
            # START FRONTEND
            # =====================================

            echo "🟢 Starting Frontend..."

            docker compose up -d frontend

            echo "⏳ Waiting for Frontend..."

            sleep 15

            # =====================================
            # LIGHTWEIGHT HEALTH CHECKS
            # =====================================

            echo "🏥 Checking Backend..."

            curl --max-time 10 http://127.0.0.1:5000/health || true

            echo "🏥 Checking Frontend..."

            curl --max-time 10 http://127.0.0.1:3000 || true

            # =====================================
            # SHOW PORT STATUS
            # =====================================

            echo "🌐 Active Ports"

            sudo lsof -i :3000 || true

            sudo lsof -i :5000 || true

            sudo lsof -i :80 || true

            sudo lsof -i :443 || true

            # =====================================
            # NGINX VALIDATION
            # =====================================

            echo "🔧 Validating NGINX..."

            sudo nginx -t

            echo "🔄 Restarting NGINX..."

            sudo systemctl restart nginx

            # =====================================
            # FINAL CONTAINER STATUS
            # =====================================

            echo "📦 Running Containers"

            docker ps

            echo ""

            echo "========================================="
            echo "✅ Deployment Finished Successfully"
            echo "========================================="

            echo ""

            echo "🌐 Frontend:"
            echo "https://intervix.duckdns.org"

            echo ""

            echo "🌐 Backend:"
            echo "https://intervix.duckdns.org/api"