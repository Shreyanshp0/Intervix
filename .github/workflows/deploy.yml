name: Optimized CI/CD Pipeline for Low-Resource Environments

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t shreyanshp0/intervix-backend:latest ./Backend
          docker push shreyanshp0/intervix-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -t shreyanshp0/intervix-frontend:latest ./Frontend
          docker push shreyanshp0/intervix-frontend:latest

      - name: Deploy to EC2 with Staged Startup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/Intervix

            echo "======================================================"
            echo "🚀 Starting Optimized Deployment for Low-Memory EC2"
            echo "======================================================"

            # Create .env files securely
            echo "🔐 Creating environment files..."
            # Backend .env
            cat > Backend/.env << EOF
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            EOF
            # Frontend .env (if needed for runtime vars)
            # cat > Frontend/.env << EOF
            # VITE_API_URL=${{ secrets.VITE_API_URL }}
            # EOF
            echo "✅ Environment files created."

            echo "🛑 Stopping all services to free up resources..."
            docker compose down --remove-orphans || echo "No containers were running. Proceeding."

            # Safer cleanup: Remove only unused images and networks
            echo "🧹 Performing safe cleanup..."
            docker image prune -f
            docker network prune -f
            echo "✅ Cleanup complete."

            # --- STAGE 1: Start Database ---
            echo "--- Stage 1: Starting Database ---"
            echo "📥 Pulling MongoDB image..."
            docker compose pull mongodb
            echo "🟢 Starting MongoDB..."
            docker compose up -d mongodb
            echo "⏳ Waiting for MongoDB to initialize (15 seconds)..."
            sleep 15

            # --- STAGE 2: Start Backend ---
            echo "--- Stage 2: Starting Backend ---"
            echo "📥 Pulling Backend image..."
            docker compose pull backend
            echo "🟢 Starting Backend..."
            docker compose up -d backend
            echo "⏳ Waiting for Backend to initialize (10 seconds)..."
            sleep 10

            # --- STAGE 3: Start Frontend & Coturn ---
            echo "--- Stage 3: Starting Frontend & Coturn ---"
            echo "📥 Pulling Frontend and Coturn images..."
            docker compose pull frontend coturn
            echo "🟢 Starting Frontend and Coturn..."
            docker compose up -d frontend coturn
            echo "⏳ Final wait for all services (5 seconds)..."
            sleep 5

            echo "=========================================="
            echo "📊 Current Container Status:"
            docker compose ps
            echo "=========================================="

            # --- Lightweight Health Validation ---
            echo "🏥 Performing lightweight health validation..."
            
            # Check backend (retry loop for resilience)
            echo "  → Checking backend connectivity..."
            for i in {1..5}; do
              if curl -sf http://127.0.0.1:5000/health > /dev/null; then
                echo "  ✅ Backend is responsive."
                break
              else
                if [ $i -eq 5 ]; then
                  echo "  ❌ Backend failed to respond after 5 attempts."
                  docker compose logs backend --tail 50
                  exit 1
                fi
                echo "  ⏳ Backend not ready, retrying in 3s... (Attempt $i/5)"
                sleep 3
              fi
            done

            # Check frontend
            echo "  → Checking frontend connectivity..."
            if curl -sf http://127.0.0.1:3000/ > /dev/null; then
              echo "  ✅ Frontend is responsive."
            else
              echo "  ❌ Frontend failed to respond."
              docker compose logs frontend --tail 50
              exit 1
            fi

            echo ""
            echo "=========================================="
            echo "✅ Deployment completed successfully!"
            echo "=========================================="
            echo ""
            echo "🔗 Application is accessible via your NGINX reverse proxy."