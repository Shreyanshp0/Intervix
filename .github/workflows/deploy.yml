name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Backend .env
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> Backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> Backend/.env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> Backend/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> Backend/.env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> Backend/.env

      - name: Create Frontend .env
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> Frontend/.env

      - name: Build Backend Docker Image
        run: |
          docker build -t shreyanshp0/intervix-backend ./Backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t shreyanshp0/intervix-frontend ./Frontend

      - name: Push Backend Docker Image
        run: |
          docker push shreyanshp0/intervix-backend

      - name: Push Frontend Docker Image
        run: |
          docker push shreyanshp0/intervix-frontend