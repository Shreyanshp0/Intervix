name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # SET TIMESTAMP
      # ==========================================

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      # ==========================================
      # DOCKER LOGIN
      # ==========================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # NODE SETUP
      # ==========================================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ==========================================
      # INSTALL FRONTEND DEPENDENCIES
      # ==========================================

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm ci

      # ==========================================
      # BUILD BACKEND IMAGE
      # ==========================================

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t shreyanshp0/intervix-backend:latest \
            -t shreyanshp0/intervix-backend:${{ env.TIMESTAMP }} \
            ./Backend

      # ==========================================
      # BUILD FRONTEND IMAGE
      # ==========================================

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t shreyanshp0/intervix-frontend:latest \
            -t shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }} \
            ./Frontend

      # ==========================================
      # PUSH BACKEND IMAGES
      # ==========================================

      - name: Push Backend Images
        run: |
          docker push shreyanshp0/intervix-backend:latest
          docker push shreyanshp0/intervix-backend:${{ env.TIMESTAMP }}

      # ==========================================
      # PUSH FRONTEND IMAGES
      # ==========================================

      - name: Push Frontend Images
        run: |
          docker push shreyanshp0/intervix-frontend:latest
          docker push shreyanshp0/intervix-frontend:${{ env.TIMESTAMP }}

      # ==========================================
      # DEPLOY TO EC2
      # ==========================================

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          envs: MONGODB_URI,JWT_SECRET,GROQ_API_KEY,GEMINI_API_KEY,HF_TOKEN

          script: |

            set -e

            echo "=========================================="
            echo "🚀 STARTING DEPLOYMENT"
            echo "=========================================="

            cd ~/Intervix

            echo ""
            echo "📦 Pulling latest code..."

            git reset --hard
            git pull origin main

            echo ""
            echo "📁 Creating environment files..."

            mkdir -p ~/Intervix/Backend
            mkdir -p ~/Intervix/Frontend

            # =====================================
            # BACKEND .ENV
            # =====================================

            cat > ~/Intervix/Backend/.env <<EOF
            MONGODB_URI=${MONGODB_URI}
            JWT_SECRET=${JWT_SECRET}
            GROQ_API_KEY=${GROQ_API_KEY}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            HF_TOKEN=${HF_TOKEN}

            CLIENT_URL=https://intervix.duckdns.org

            NODE_ENV=production
            EOF

            # =====================================
            # FRONTEND .ENV
            # =====================================

            cat > ~/Intervix/Frontend/.env <<EOF
            VITE_API_URL=https://intervix.duckdns.org/api

            NODE_ENV=production
            EOF

            echo "✅ Environment files created"

            echo ""
            echo "⏹️ Stopping existing containers..."

            docker compose down || true

            echo ""
            echo "🧹 Cleaning Docker resources..."

            docker system prune -af || true
            docker builder prune -af || true

            echo ""
            echo "📥 Pulling latest Docker images..."

            docker compose pull

            echo ""
            echo "🔨 Starting containers..."

            docker compose up -d --force-recreate --no-build

            echo ""
            echo "⏳ Waiting for services..."

            sleep 20

            echo ""
            echo "📊 Container Status"

            docker compose ps

            echo ""
            echo "🌐 Port Status"

            sudo lsof -i :3000 || true
            sudo lsof -i :5000 || true
            sudo lsof -i :80 || true
            sudo lsof -i :443 || true

            echo ""
            echo "🏥 HEALTH CHECKS"

            # =====================================
            # BACKEND HEALTH CHECK
            # =====================================

            echo ""
            echo "Checking Backend..."

            for i in {1..10}; do

              if curl -sf http://localhost:5000/health > /dev/null; then
                echo "✅ Backend healthy"
                break
              fi

              echo "Retry $i/10..."
              sleep 3

              if [ $i -eq 10 ]; then
                echo "❌ Backend failed"

                docker compose logs backend --tail=100

                exit 1
              fi

            done

            # =====================================
            # FRONTEND HEALTH CHECK
            # =====================================

            echo ""
            echo "Checking Frontend..."

            for i in {1..10}; do

              if curl -sf http://localhost:3000 > /dev/null; then
                echo "✅ Frontend healthy"
                break
              fi

              echo "Retry $i/10..."
              sleep 3

              if [ $i -eq 10 ]; then
                echo "❌ Frontend failed"

                docker compose logs frontend --tail=100

                exit 1
              fi

            done

            # =====================================
            # NGINX CHECK
            # =====================================

            echo ""
            echo "🔧 Checking NGINX..."

            sudo nginx -t

            sudo systemctl restart nginx

            echo "✅ NGINX OK"

            # =====================================
            # FINAL STATUS
            # =====================================

            echo ""
            echo "=========================================="
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo "=========================================="

            echo ""
            echo "🌐 URLs"
            echo "Frontend : https://intervix.duckdns.org"
            echo "Backend  : https://intervix.duckdns.org/api"
            echo ""

            echo "📦 Docker Containers"
            docker ps

            echo ""
            echo "📜 Recent Logs"
            docker compose logs --tail=20