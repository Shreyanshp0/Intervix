# NGINX Configuration for HOST machine (not containerized)
# This configuration assumes NGINX is installed directly on the EC2 instance
# Use this if you're NOT running NGINX in a Docker container
#
# Copy this to: /etc/nginx/sites-available/intervix
# Then: sudo ln -s /etc/nginx/sites-available/intervix /etc/nginx/sites-enabled/intervix
# Restart: sudo systemctl restart nginx

# Upstream definitions pointing to Docker containers on localhost
upstream intervix_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream intervix_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP Server - Redirect to HTTPS and handle Let's Encrypt challenges
server {
    listen 80;
    listen [::]:80;
    server_name intervix.duckdns.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server - Main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name intervix.duckdns.org;

    # SSL Certificate paths (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/intervix.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intervix.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/intervix.duckdns.org/chain.pem;

    # SSL Configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Client max body size
    client_max_body_size 25m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), fullscreen=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self' https://intervix.duckdns.org; frame-src 'self' blob:; connect-src 'self' https://intervix.duckdns.org wss://intervix.duckdns.org blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: data: mediastream:; worker-src 'self' blob:; object-src 'none'; upgrade-insecure-requests" always;

    # Logging
    access_log /var/log/nginx/intervix_access.log;
    error_log /var/log/nginx/intervix_error.log;

    # Frontend Root Location
    location / {
        proxy_pass http://intervix_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Backend API Routes
    location /api/ {
        proxy_pass http://intervix_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # File Uploads
    location /uploads/ {
        proxy_pass http://intervix_backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # WebSocket Proxy (Socket.io for live interviews, chat, etc.)
    location /socket.io/ {
        proxy_pass http://intervix_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 7d;
    }

    # Health check endpoint for monitoring
    location /health/host-nginx {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# Redirect www to non-www (optional)
# Uncomment if you want to redirect to intervix.duckdns.org
