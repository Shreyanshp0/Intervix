# NGINX Configuration for HOST machine (not containerized)
# Optimized for low-memory environments
#
# Key Optimizations:
# - `worker_processes auto;` to match CPU cores
# - `worker_connections 256;` reduced for low traffic
# - `proxy_buffering off;` to reduce memory usage for proxied requests
# - `keepalive_timeout 30;` shorter timeout to free up connections
# - Minimal logging to reduce I/O

worker_processes auto;

events {
    worker_connections 256; # Reduced for low-resource servers
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  30; # Shorter timeout
    types_hash_max_size 2048;

    # Logging (minimal)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn; # Log warnings and above

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream definitions pointing to Docker containers on localhost
    upstream intervix_backend {
        server 127.0.0.1:5000;
        keepalive 32; # Fewer keepalive connections
    }

    upstream intervix_frontend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # HTTP Server - Redirect to HTTPS and handle Let's Encrypt challenges
    server {
        listen 80;
        listen [::]:80;
        server_name your-domain.com www.your-domain.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server - Main application
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        
        # SSL Optimizations
        ssl_session_cache shared:SSL:5m; # Smaller cache
        ssl_session_timeout 1h;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Security Headers
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # Frontend Root Location
        location / {
            proxy_pass http://intervix_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off; # Reduce memory usage
        }

        # Backend API Routes
        location /api/ {
            proxy_pass http://intervix_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            client_max_body_size 10m; # Smaller max upload size
        }

        # WebSocket Proxy (Socket.io)
        location /socket.io/ {
            proxy_pass http://intervix_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 3600s; # Keep long-lived connections
        }
    }
}
