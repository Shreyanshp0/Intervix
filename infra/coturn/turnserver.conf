listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=${TURN_STATIC_AUTH_SECRET}
realm=intervix.duckdns.org
server-name=intervix.duckdns.org
min-port=49160
max-port=49200
no-cli
no-multicast-peers
no-loopback-peers
stale-nonce=600
cert=/etc/letsencrypt/live/intervix.duckdns.org/fullchain.pem
pkey=/etc/letsencrypt/live/intervix.duckdns.org/privkey.pem
log-file=stdout
